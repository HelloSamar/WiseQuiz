<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - OWS Quiz</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #0f0e17;
            color: #fffffe;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .card {
            width: 100%;
            max-width: 440px;
            background: #1a1928;
            border-radius: 20px;
            padding: 40px 24px;
            border: 1px solid rgba(255,255,255,0.06);
            text-align: center;
        }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            margin-bottom: 16px;
            color: #ef476f;
        }
        p {
            color: #a7a9be;
            font-size: 15px;
            line-height: 1.6;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #ff6b35;
            color: #fffffe;
            text-decoration: none;
            border-radius: 8px;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <div class="card">
        <h1>⚠️ {{ error_title }}</h1>
        <p>{{ error_message }}</p>
        <a href="/">Return to Quiz</a>
    </div>
</body>
</html>
